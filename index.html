                heroModels = heroModels.filter(model => model !== null && model !== undefined);
                
                if (heroModels.length === 0) {
                    throw new Error('No hero models created');
                }
                
                for (let i = 0; i < heroModels.length; i++) {
                    const heroModel = heroModels[i];
                    heroModel.position.set(-5, 0, -3 + i * 2);
                    heroModel.rotation.y = Math.PI / 6; // Face right slightly
                    heroModel.castShadow = true;
                    battleScene.add(heroModel);
                    battleHeroModels.push(heroModel);
                }
            } catch (error) {
                console.error('Error creating hero models:', error);
                // Create fallback hero models
                for (let i = 0; i < 3; i++) {
                    const fallbackGeometry = new THREE.BoxGeometry(0.8, 2, 0.6);
                    const fallbackMaterial = new THREE.MeshStandardMaterial({ color: 0x0000ff });
                    const fallbackHero = new THREE.Mesh(fallbackGeometry, fallbackMaterial);
                    fallbackHero.position.set(-5, 0, -3 + i * 2);
                    fallbackHero.rotation.y = Math.PI / 6;
                    battleScene.add(fallbackHero);
                    battleHeroModels.push(fallbackHero);
                }
            }
            
            // Position enemies on the right side
            battleEnemyModels = [];
            for (let i = 0; i < 2; i++) {
                let enemyModel;
                // Check if this is Jeff
                if (isJeff && vice && vice.name === JEFF_ENCOUNTER.name) {
                    if (i === 0) {
                        enemyModel = createJeffModel();
                    } else {
                        // Maxwell - similar but female
                        enemyModel = createJeffModel(); // Reuse model, will scale/modify
                        if (enemyModel) enemyModel.scale.set(0.85, 0.85, 0.85); // Smaller for Maxwell
                    }
                }
                // Check if this is a mythical creature
                else if (vice) {
                    const creatureData = MYTHICAL_CREATURES[dungeonLevel];
                    if (creatureData && vice.name === creatureData.name) {
                        enemyModel = createMythicalCreatureModel(creatureData, dungeonLevel);
                    } else {
                        enemyModel = createViceModel(vice);
                    }
                }
                
                // Safety check: ensure model was created
                if (!enemyModel) {
                    console.error('Failed to create enemy model for', vice);
                    // Create a fallback simple model
                    const fallbackGeometry = new THREE.BoxGeometry(1, 2, 1);
                    const fallbackMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                    enemyModel = new THREE.Mesh(fallbackGeometry, fallbackMaterial);
                }
                
                enemyModel.position.set(5, 0, -1 + i * 2);
                enemyModel.rotation.y = -Math.PI / 6; // Face left slightly
                enemyModel.castShadow = true;
                
                // Scale down minion slightly (if not already scaled for Maxwell)
                if (i === 1 && !isJeff) {
                    enemyModel.scale.set(0.7, 0.7, 0.7);
                }
                
                battleScene.add(enemyModel);
                battleEnemyModels.push(enemyModel);
            }
            
            // Battle camera setup with dynamic positioning
            battleCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            battleCamera.position.set(0, 4, 10);
            battleCamera.lookAt(0, 1, 0);
            
            // Store original camera position for animations
            battleCamera.userData.originalPosition = battleCamera.position.clone();
            battleCamera.userData.targetPosition = battleCamera.position.clone();
            
            } catch (error) {
                console.error('Error creating battle scene:', error);
                // Fallback: create minimal battle scene
                if (!battleScene) battleScene = new THREE.Scene();
                if (!battleCamera) {
                    battleCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                    battleCamera.position.set(0, 4, 10);
                }
            }
        }

        // Animate battle camera (called during battles)
        function updateBattleCamera() {
            if (!battleCamera) return;
            
            // Smooth camera movement
            if (battleCamera.userData.targetPosition) {
                battleCamera.position.lerp(battleCamera.userData.targetPosition, 0.1);
            }
            
            // Subtle camera sway
            const time = Date.now() * 0.0005;
            const swayAmount = 0.1;
            battleCamera.position.x += Math.sin(time) * swayAmount * 0.05;
            battleCamera.position.y += Math.cos(time * 0.7) * swayAmount * 0.05;
            
            battleCamera.lookAt(0, 1, 0);
        }

        // Focus camera on hero during their turn
        function focusCameraOnHero(index) {
            if (!battleCamera || !battleHeroModels[index]) return;
            const hero = battleHeroModels[index];
            battleCamera.userData.targetPosition = new THREE.Vector3(
                hero.position.x + 2,
                3,
                hero.position.z + 6
            );
        }

        // Focus camera on enemy during attack
        function focusCameraOnEnemy(index) {
            if (!battleCamera || !battleEnemyModels[index]) return;
            const enemy = battleEnemyModels[index];
            battleCamera.userData.targetPosition = new THREE.Vector3(
                enemy.position.x - 2,
                3,
                enemy.position.z + 6
            );
        }

        // Reset camera to default battle view
        function resetBattleCamera() {
            if (!battleCamera) return;
            battleCamera.userData.targetPosition = new THREE.Vector3(0, 4, 10);
        }

        function disposeBattleScene() {
            if (battleScene) {
                while(battleScene.children.length > 0) { 
                    const obj = battleScene.children[0];
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) {
                        if (Array.isArray(obj.material)) {
                            obj.material.forEach(m => m.dispose());
                        } else {
                            obj.material.dispose();
                        }
                    }
                    battleScene.remove(obj);
                }
                battleScene = null;
            }
            battleHeroModels = [];
            battleEnemyModels = [];
        }

        function updateBattleUI() {
            // Highlight active hero
            battleHeroModels.forEach((model, i) => {
                if (i === battle.currentHeroIndex && battle.phase !== 'enemyTurn') {
                    model.position.y = Math.sin(Date.now() * 0.003) * 0.1; // Gentle bounce
                } else {
                    model.position.y = 0;
                }
            });
            
            // Highlight targeted enemy
            battleEnemyModels.forEach((model, i) => {
                if (i === battle.targetIndex && battle.phase === 'target') {
                    model.position.y = Math.sin(Date.now() * 0.005) * 0.1;
                } else {
                    model.position.y = 0;
                }
            });
            
            // Update hero status display (visible horizontal strip at bottom)
            const heroStatusEl = document.getElementById('battle-status');
            heroStatusEl.innerHTML = '';
            heroStatusEl.style.display = 'flex';
            heroStatusEl.style.flexDirection = 'row';
            heroStatusEl.style.gap = '6px';
            
            heroes.forEach((hero, i) => {
                const statusDiv = document.createElement('div');
                statusDiv.className = 'hero-status' + (i === battle.currentHeroIndex && battle.phase !== 'enemyTurn' ? ' active' : '');
                const hpPercent = Math.max(0, (hero.hp / (hero.maxHp + inventory.hpBoost)) * 100);
                const mpPercent = Math.max(0, (hero.mp / hero.maxMp) * 100);
                
                statusDiv.innerHTML = `
                    <span class="hero-name">${hero.name}</span>
                    <span class="stat-bar-container hp-bar">
                        <span class="stat-label">HP</span>
                        <span class="stat-bar">
                            <span class="stat-bar-fill" style="width: ${hpPercent}%;"></span>
                        </span>
                        <span class="stat-value">${Math.max(0, Math.floor(hero.hp))}/${hero.maxHp + inventory.hpBoost}</span>
                    </span>
                    <span class="stat-bar-container mp-bar">
                        <span class="stat-label">MP</span>
                        <span class="stat-bar">
                            <span class="stat-bar-fill" style="width: ${mpPercent}%;"></span>
                        </span>
                        <span class="stat-value">${hero.mp}/${hero.maxMp}</span>
                    </span>
                `;
                heroStatusEl.appendChild(statusDiv);
            });
            
            // Enemy status hidden in FFX style - no enemy health bars shown
            
            // Update actions menu (bottom left - FFX style)
            const actionsEl = document.getElementById('battle-actions');
            if (battle.phase === 'menu') {
                const hero = heroes[battle.currentHeroIndex];
                const trinityBtn = trinityUnlocked ? `<button class="battle-btn" onclick="selectBattleAction('trinity')">✝ Trinity (All MP)</button>` : '';
                actionsEl.innerHTML = `
                    <button class="battle-btn selected" onclick="selectBattleAction('attack')">Attack</button>
                    <button class="battle-btn" onclick="selectBattleAction('special')">${hero.specialAttack} (${hero.specialCost} MP)</button>
                    <button class="battle-btn" onclick="selectBattleAction('prayer')">Litany of the Saints (10 MP)</button>
                    ${trinityBtn}
                    <button class="battle-btn" onclick="selectBattleAction('item')">Item</button>
                    <button class="battle-btn" onclick="selectBattleAction('flee')">Flee</button>
                `;
            } else if (battle.phase === 'target') {
                const targetEnemy = battle.enemies[battle.targetIndex];
                const enemyName = targetEnemy ? targetEnemy.name : 'Enemy';
                actionsEl.innerHTML = `
                    <div style="padding: 2px 4px; background: rgba(231, 76, 60, 0.1); border: 0.5px solid rgba(231, 76, 60, 0.3); border-radius: 2px; margin-bottom: 1px; text-align: center; display: inline-block;">
                        <span style="font-weight: bold; color: #e74c3c; text-shadow: 1px 1px 2px rgba(0, 0, 0, 1); font-size: 5px;">TARGET: </span>
                        <span style="font-weight: bold; color: #ecf0f1; text-shadow: 1px 1px 2px rgba(0, 0, 0, 1); font-size: 5px;">${enemyName}</span>
                    </div>
                    <button class="battle-btn" onclick="changeTarget(-1)">◀</button>
                    <button class="battle-btn selected" onclick="confirmTarget()">✓</button>
                    <button class="battle-btn" onclick="changeTarget(1)">▶</button>
                    <button class="battle-btn" onclick="cancelTarget()">✕</button>
                `;
            } else if (battle.phase === 'item') {
                actionsEl.innerHTML = `
                    <button class="battle-btn" onclick="useItem('divineElixir')">Divine Elixir (${inventory.divineElixirs})</button>
                    <button class="battle-btn selected" onclick="battle.phase='menu'; updateBattleUI();">Back</button>
                `;
            }
            
            // Battle log hidden in FFX style - no update needed
        }

        function selectBattleAction(action) {
            if (action === 'attack' || action === 'special') {
                battle.currentAction = action;
                battle.phase = 'target';
                battle.targetIndex = battle.enemies.findIndex(e => e.hp > 0);
                focusCameraOnEnemy(battle.targetIndex);
                updateBattleUI();
            } else if (action === 'prayer') {
                battle.currentAction = 'prayer';
                battle.phase = 'executing';
                executePrayerAttack();
            } else if (action === 'trinity') {
                battle.currentAction = 'trinity';
                battle.phase = 'target';
                battle.targetIndex = battle.enemies.findIndex(e => e.hp > 0);
                focusCameraOnEnemy(battle.targetIndex);
                updateBattleUI();
            } else if (action === 'item') {
                battle.phase = 'item';
                updateBattleUI();
            } else if (action === 'flee') {
                if (Math.random() < 0.6) {
                    battle.log.push('Fled successfully!');
                    endBattle(false, true);
                } else {
                    battle.log.push("Couldn't escape!");
                    nextTurn();
                }
            }
        }

        function executePrayerAttack() {
            const hero = heroes[battle.currentHeroIndex];
            
            if (hero.mp >= 10) {
                const damage = 40 + Math.floor(Math.random() * 20);
                let enemiesHit = 0;
                
                battle.enemies.forEach((enemy, i) => {
                    if (enemy.hp > 0) {
                        enemy.hp -= damage;
                        enemiesHit++;
                        const enemyModel = battleEnemyModels[i];
                        if (enemyModel) {
                            if (enemy.hp > 0) {
                                shakeModel(enemyModel, 400, 0.35);
                            } else {
                                setTimeout(() => fadeOutModel(enemyModel, 600), 300);
                            }
                        }
                    }
                });
                
                hero.mp -= 10;
                battle.log.push(`${hero.name} prays the Litany of the Saints! ${damage} holy damage to all foes!`);
                
                // All heroes glow briefly using setEmissive helper
                battleHeroModels.forEach(m => {
                    setEmissive(m, 0xffffff, 0.8);
                    setTimeout(() => setEmissive(m, 0x000000, 0), 900);
                });
                
            } else {
                battle.log.push(`${hero.name} lacks MP!`);
            }
            
            setTimeout(() => { if (battle.active) nextTurn(); }, 1200);
        }

        function changeTarget(delta) {
            let newIndex = battle.targetIndex + delta;
            while (newIndex >= 0 && newIndex < battle.enemies.length && battle.enemies[newIndex].hp <= 0) {
                newIndex += delta;
            }
            if (newIndex >= 0 && newIndex < battle.enemies.length) {
                battle.targetIndex = newIndex;
                focusCameraOnEnemy(battle.targetIndex);
                updateBattleUI();
            }
        }

        // Safe material helper — only sets emissive on materials that support it
        function setEmissive(model, color, intensity) {
            if (!model) return;
            model.traverse((child) => {
                if (child.isMesh && child.material && child.material.emissive !== undefined) {
                    child.material.emissive.setHex(color);
                    child.material.emissiveIntensity = intensity;
                }
            });
        }

        // Safe fade helper using RAF chain instead of setInterval
        function fadeOutModel(model, duration, onDone) {
            if (!model) return;
            const start = performance.now();
            function fadeStep() {
                const t = Math.min((performance.now() - start) / duration, 1);
                model.traverse((child) => {
                    if (child.isMesh && child.material) {
                        child.material.transparent = true;
                        child.material.opacity = 1 - t;
                    }
                });
                if (t < 1) requestAnimationFrame(fadeStep);
                else if (onDone) onDone();
            }
            requestAnimationFrame(fadeStep);
        }

        // Safe shake helper using RAF chain
        function shakeModel(model, duration, intensity) {
            if (!model) return;
            const start = performance.now();
            const origX = model.position.x;
            function shakeStep() {
                const t = (performance.now() - start) / duration;
                if (t < 1) {
                    model.position.x = origX + (Math.random() - 0.5) * intensity * (1 - t);
                    requestAnimationFrame(shakeStep);
                } else {
                    model.position.x = origX;
                }
            }
            requestAnimationFrame(shakeStep);
        }

        // Safe hero dash using RAF
        function dashHero(model, duration) {
            if (!model) return;
            const start = performance.now();
            const origZ = model.position.z;
            function dashStep() {
                const t = Math.min((performance.now() - start) / duration, 1);
                model.position.z = origZ + Math.sin(t * Math.PI) * 3;
                if (t < 1) requestAnimationFrame(dashStep);
                else model.position.z = origZ;
            }
            requestAnimationFrame(dashStep);
        }

        function confirmTarget() {
            const hero = heroes[battle.currentHeroIndex];
            const target = battle.enemies[battle.targetIndex];
            if (!target) { nextTurn(); return; }

            if (battle.currentAction === 'attack') {
                const damage = Math.max(1, hero.atk - (target.def || 0) + Math.floor(Math.random() * 5));
                target.hp -= damage;
                battle.log.push(`${hero.name} deals ${damage} damage to ${target.name}!`);

                const heroModel = battleHeroModels[battle.currentHeroIndex];
                const enemyModel = battleEnemyModels[battle.targetIndex];

                if (heroModel) dashHero(heroModel, 300);

                if (enemyModel) {
                    if (target.hp > 0) {
                        shakeModel(enemyModel, 400, 0.4);
                        setEmissive(enemyModel, 0xff0000, 0.6);
                        setTimeout(() => setEmissive(enemyModel, 0x000000, 0), 400);
                    } else {
                        setTimeout(() => fadeOutModel(enemyModel, 600), 400);
                    }
                }

            } else if (battle.currentAction === 'special') {
                if (hero.mp >= hero.specialCost) {
                    const dmg = hero.specialDamage;
                    target.hp -= dmg;
                    hero.mp -= hero.specialCost;
                    battle.log.push(`${hero.name} uses ${hero.specialAttack}! ${dmg} damage!`);

                    const heroModel  = battleHeroModels[battle.currentHeroIndex];
                    const enemyModel = battleEnemyModels[battle.targetIndex];

                    if (hero.name === 'St. Michael') {
                        // Angels descend — lightweight point lights only, no setInterval
                        if (heroModel) setEmissive(heroModel, 0xffd700, 1.0);
                        for (let i = 0; i < 5; i++) {
                            setTimeout(() => {
                                if (!battleScene) return;
                                const light = new THREE.PointLight(0xffffff, 3, 8);
                                const ex = enemyModel ? enemyModel.position.x + (Math.random()-0.5)*2 : 0;
                                const ez = enemyModel ? enemyModel.position.z + (Math.random()-0.5)*2 : 0;
                                light.position.set(ex, 8, ez);
                                battleScene.add(light);
                                // Descend via RAF
                                const s = performance.now();
                                const drop = () => {
                                    const t = Math.min((performance.now()-s)/700, 1);
                                    light.position.y = 8 * (1 - t);
                                    if (t < 1) requestAnimationFrame(drop);
                                    else if (battleScene) battleScene.remove(light);
                                };
                                requestAnimationFrame(drop);
                            }, i * 150);
                        }
                        setTimeout(() => { if (heroModel) setEmissive(heroModel, 0x000000, 0); }, 1500);

                    } else if (hero.name === 'St. Vincent') {
                        // Rosary Throw — RAF arc
                        if (heroModel && enemyModel && battleScene) {
                            const rosary = new THREE.Mesh(
                                new THREE.SphereGeometry(0.15, 24, 24),
                                new THREE.MeshStandardMaterial({ color: 0x8b4513, emissive: 0x8b4513, emissiveIntensity: 0.5 })
                            );
                            rosary.position.copy(heroModel.position);
                            rosary.position.y = 1.5;
                            battleScene.add(rosary);
                            const from = heroModel.position.clone();
                            const to   = enemyModel.position.clone();
                            const s = performance.now();
                            const fly = () => {
                                const t = Math.min((performance.now()-s)/600, 1);
                                rosary.position.lerpVectors(from, to, t);
                                rosary.position.y = 1.5 + Math.sin(t * Math.PI) * 2;
                                rosary.rotation.z += 0.15;
                                if (t < 1) requestAnimationFrame(fly);
                                else if (battleScene) battleScene.remove(rosary);
                            };
                            requestAnimationFrame(fly);
                        }

                    } else if (hero.name === 'St. Joan') {
                        // Divine Charge — glow then dash
                        if (heroModel) {
                            setEmissive(heroModel, 0xffd700, 0.8);
                            setTimeout(() => {
                                if (heroModel) {
                                    dashHero(heroModel, 500);
                                    setTimeout(() => { if (heroModel) setEmissive(heroModel, 0x000000, 0); }, 600);
                                }
                            }, 700);
                        }
                    }

                    // Damage / defeat animation on enemy
                    if (enemyModel) {
                        setTimeout(() => {
                            if (target.hp > 0) {
                                shakeModel(enemyModel, 500, 0.5);
                            } else {
                                fadeOutModel(enemyModel, 700);
                            }
                        }, 600);
                    }

                } else {
                    battle.log.push(`${hero.name} lacks MP!`);
                }

            } else if (battle.currentAction === 'trinity') {
                if (hero.mp > 0) {
                    const mpSpent = hero.mp;
                    hero.mp = 0;
                    target.hp = 0;
                    battle.log.push(`✝ ${hero.name} calls upon the Holy Trinity!`);
                    battle.log.push(`Divine light obliterates ${target.name}! (${mpSpent} MP consumed)`);

                    if (battleScene) {
                        const light = new THREE.PointLight(0xffd700, 12, 25);
                        light.position.set(0, 5, 0);
                        battleScene.add(light);
                        AnimationSystem.createParticleEffect(new THREE.Vector3(0, 5, 0), 0xffd700, 30, 'fall');
                        setTimeout(() => { if (battleScene) battleScene.remove(light); }, 2000);
                    }

                    const enemyModel = battleEnemyModels[battle.targetIndex];
                    if (enemyModel) {
                        setEmissive(enemyModel, 0xffd700, 1.0);
                        setTimeout(() => fadeOutModel(enemyModel, 800), 400);
                    }
                } else {
                    battle.log.push(`${hero.name} has no MP for Trinity!`);
                }
            }

            const delay = (battle.currentAction === 'special' || battle.currentAction === 'trinity') ? 1800 : 700;
            setTimeout(() => { if (battle.active) nextTurn(); }, delay);
        }

        function cancelTarget() {
            battle.phase = 'menu';
            updateBattleUI();
        }

        function useItem(itemType) {
            const hero = heroes[battle.currentHeroIndex];
            
            if (itemType === 'divineElixir' && inventory.divineElixirs > 0) {
                heroes.forEach(h => {
                    h.hp = h.maxHp + inventory.hpBoost;
                    h.mp = h.maxMp;
                });
                inventory.divineElixirs--;
                battle.log.push(`${hero.name} uses Divine Elixir! All heroes fully restored!`);
                updateHUD();
                nextTurn();
            } else {
                battle.log.push('No items available!');
                updateBattleUI();
            }
        }

        function nextTurn() {
            if (checkBattleEnd()) return;
            
            battle.currentHeroIndex++;
            if (battle.currentHeroIndex >= heroes.length) {
                executeEnemyTurn();
            } else {
                battle.phase = 'menu';
                battle.targetIndex = battle.enemies.findIndex(e => e.hp > 0);
                battle.log.push(`${heroes[battle.currentHeroIndex].name}'s turn!`);
                resetBattleCamera();
                focusCameraOnHero(battle.currentHeroIndex);
                updateBattleUI();
            }
        }

        function executeEnemyTurn() {
            let aliveEnemies = battle.enemies.filter(e => e.hp > 0);
            
            aliveEnemies.forEach(enemy => {
                const aliveHeroes = heroes.filter(h => h.hp > 0);
                if (aliveHeroes.length > 0) {
                    const target = aliveHeroes[Math.floor(Math.random() * aliveHeroes.length)];
                    const damage = Math.max(1, enemy.atk - target.def + Math.floor(Math.random() * 5));
                    
                    // Jesus (first hero in divine party) is invincible in New Game+ mode
                    if (newGamePlus && target.name === "Jesus Christ") {
                        battle.log.push(`${enemy.name} attacks ${target.name} but the attack has no effect! Jesus is invincible!`);
                    } else {
                        target.hp -= damage;
                        battle.log.push(`${enemy.name} attacks ${target.name} for ${damage} damage!`);
                    }
                }
            });
            
            if (checkBattleEnd()) return;
            
            battle.currentHeroIndex = 0;
            battle.phase = 'menu';
            battle.log.push(`${heroes[0].name}'s turn!`);
            updateBattleUI();
        }

        function checkBattleEnd() {
            if (heroes.every(h => h.hp <= 0)) {
                battle.log.push('All heroes defeated!');
                updateBattleUI();
                setTimeout(() => endBattle(false), 2000);
                return true;
            } else if (battle.enemies.every(e => e.hp <= 0)) {
                battle.log.push(`Victory over ${battle.enemies[0].vice.name}!`);
                updateBattleUI();
                setTimeout(() => endBattle(true), 2000);
                return true;
            }
            return false;
        }

        function endBattle(won, fled = false) {
            document.getElementById('battle-ui').style.display = 'none';
            document.getElementById('battle-status').style.display = 'none';
            document.getElementById('enemy-status').style.display = 'none';
            battle.active = false;
            disposeBattleScene();
            
            if (fled) {
                gameState = 'explore';
                return;
            }
            
            if (won) {
                const viceName = battle.enemies[0].vice.name;
                const enemyToRemove = enemies.find(e => e.vice.name === viceName);
                if (enemyToRemove) {
                    scene.remove(enemyToRemove.mesh);
                    enemies = enemies.filter(e => e !== enemyToRemove);
                }
                
                // Check if this was a mythical creature or Jeff
                const isMythicalCreature = enemyToRemove && (enemyToRemove.isMythical || enemyToRemove.isJeff);
                
                // Award virtue item for deadly sins
                if (DEADLY_SINS.includes(viceName) && !inventory.virtueItems.includes(viceName)) {
                    const virtueItem = VIRTUE_ITEMS[viceName];
                    inventory.virtueItems.push(viceName);
                    
                    if (virtueItem.atkBoost) inventory.atkBoost += virtueItem.atkBoost;
                    if (virtueItem.defBoost) inventory.defBoost += virtueItem.defBoost;
                    if (virtueItem.hpBoost) {
                        inventory.hpBoost += virtueItem.hpBoost;
                        heroes.forEach(h => h.maxHp += virtueItem.hpBoost);
                    }
                }
                
                if (viceName === "The Devil") {
                    showViceTeaching(battle.enemies[0].vice, () => {
                        showGameVictory();
                    });
                    return;
                }
                
                // Mythical creatures give special stat boosts and don't progress the level
                if (isMythicalCreature) {

                    inventory.gold += goldReward;
                    
                    // Always give 3 Divine Elixirs for defeating mythical creatures
                    inventory.divineElixirs += 3;
                    
                    // Check if this mythical creature was already defeated (can't get stat boost twice)
                    const alreadyDefeated = defeatedMythicalCreatures.has(viceName);
                    
                    if (!alreadyDefeated) {
                        // Mark as defeated
                        defeatedMythicalCreatures.add(viceName);
                        
                        // Apply special stat boost for this mythical creature (first time only)
                        const mythicalReward = MYTHICAL_REWARDS[viceName];
                        if (mythicalReward) {
                            // Apply HP boost
                            if (mythicalReward.hpBoost) {
                                inventory.hpBoost += mythicalReward.hpBoost;
                                heroes.forEach(hero => {
                                    hero.maxHp += mythicalReward.hpBoost;
                                    hero.hp += mythicalReward.hpBoost; // Also heal them
                                });
                            }
                            
                            // Apply ATK boost
                            if (mythicalReward.atkBoost) {
                                inventory.atkBoost += mythicalReward.atkBoost;
                            }
                            
                            // Apply DEF boost
                            if (mythicalReward.defBoost) {
                                inventory.defBoost += mythicalReward.defBoost;
                            }
                            
                            // Show special reward screen (includes Divine Elixirs notification)
                            showMythicalReward(mythicalReward, goldReward, () => {
                                showViceTeaching(battle.enemies[0].vice, () => {
                                    gameState = 'explore';
                                });
                            });
                        } else {
                            showViceTeaching(battle.enemies[0].vice, () => {
                                showMessage(`Victory! Earned ${goldReward} gold from ${viceName}!`, 3000);
                                gameState = 'explore';
                            });
                        }
                    } else {
                        // Already defeated this creature - give gold and elixirs but not stat boost
                        showViceTeaching(battle.enemies[0].vice, () => {
                            showMessage(`Victory! Earned ${goldReward} gold + 3 Divine Elixirs from ${viceName}! (Already received stat boost)`, 4000);
                            gameState = 'explore';
                        });
                    }
                    return;
                }
                
                // Only deadly sins progress the level
                if (DEADLY_SINS.includes(viceName)) {
                    defeatedSins.add(viceName);
                    
                    // Award gold for defeating deadly sin
                    const goldReward = 150 + dungeonLevel * 75;  // 225 gold at level 1, 900 at level 7
                    inventory.gold += goldReward;
                    
                    if (defeatedSins.size >= 7) {
                        const virtueItem = VIRTUE_ITEMS[viceName];
                        showVirtueItemReceived(virtueItem, () => {
                            showViceTeaching(battle.enemies[0].vice, () => {
                                showMessage(`All Sins defeated! Earned ${goldReward} gold! The Devil awaits...`, 4000);
                                dungeonLevel++;
                                // Level up heroes
                                const statGains = levelUpHeroes();
                                showMessage(`Level Up! ${statGains}`, 3000);
                                setTimeout(() => {
                                    generateDungeon(true);
                                    gameState = 'explore';
                                }, 3000);
                            });
                        });
                        return;
                    }
                    
                    dungeonLevel++;
                    
                    const virtueItem = VIRTUE_ITEMS[viceName];
                    showVirtueItemReceived(virtueItem, () => {
                        showViceTeaching(battle.enemies[0].vice, () => {
                            // Level up heroes
                            const statGains = levelUpHeroes();
                            showMessage(`Victory! Earned ${goldReward} gold! Level ${dungeonLevel} - ${statGains}`, 4000);
                            setTimeout(() => {
                                generateDungeon();
                                gameState = 'explore';
                            }, 4000);
                        });
                    });
                } else {
                    // Other enemies (if any) don't progress the level
                    const goldReward = 100 + dungeonLevel * 30;
                    inventory.gold += goldReward;
                    showViceTeaching(battle.enemies[0].vice, () => {
                        showMessage(`Victory! Earned ${goldReward} gold! Continuing level ${dungeonLevel}...`, 3000);
                        gameState = 'explore';
                    });
                }
            } else {
                dungeonLevel = 1;
                defeatedSins.clear();
                defeatedMythicalCreatures.clear();
                showMessage('Defeated! Starting over...', 3000);
                inventory.gold = 0;
                inventory.atkBoost = 0;
                inventory.defBoost = 0;
                inventory.hpBoost = 0;
                inventory.mpBoost = 0;
                inventory.virtueItems = [];
                inventory.divineElixirs = 0;
                trinityUnlocked = false;
                generateDungeon();
                gameState = 'explore';
            }
        }

        // Garden-specific variables
        let jesusModel = null;
        let gardenWalkProgress = 0;
        
        // Advanced Animation System (2010+ techniques)
        const AnimationSystem = {
            particles: [],
            tweens: [],
            
            // Particle System for visual effects
            createParticleEffect(position, color, count = 20, type = 'burst') {
                if (!battleScene) return; // Safety check
                
                for (let i = 0; i < count; i++) {
                    const particle = {
                        mesh: new THREE.Mesh(
                            new THREE.SphereGeometry(0.1, 24, 24),
                            new THREE.MeshStandardMaterial({
                                color: color,
                                emissive: color,
                                emissiveIntensity: 1,
                                transparent: true,
                                opacity: 1
                            })
                        ),
                        velocity: type === 'burst' ? 
                            new THREE.Vector3(
                                (Math.random() - 0.5) * 0.3,
                                Math.random() * 0.3,
                                (Math.random() - 0.5) * 0.3
                            ) :
                            new THREE.Vector3(0, Math.random() * 0.2, 0),
                        life: 1.0,
                        decay: 0.02
                    };
                    particle.mesh.position.copy(position);
                    battleScene.add(particle.mesh);
                    this.particles.push(particle);
                }
            },
            
            // Smooth tween animation (easing functions)
            tween(object, targetProps, duration, easing = 'easeOutQuad') {
                if (!object || !targetProps) return null; // Safety check
                
                const startProps = {};
                const deltaProps = {};
                
                for (let prop in targetProps) {
                    if (object[prop] === undefined) continue; // Skip undefined properties
                    startProps[prop] = object[prop];
                    deltaProps[prop] = targetProps[prop] - startProps[prop];
                }
                
                const tween = {
                    object,
                    startProps,
                    deltaProps,
                    duration,
                    elapsed: 0,
                    easing,
                    completed: false
                };
                
                this.tweens.push(tween);
                return tween;
            },
            
            // Update all animations
            update(dt) {
                try {
                    // Update particles
                    for (let i = this.particles.length - 1; i >= 0; i--) {
                        const p = this.particles[i];
                        if (!p || !p.mesh) continue; // Safety check
                        
                        p.mesh.position.add(p.velocity);
                        p.velocity.y -= 0.01; // Gravity
                        p.life -= p.decay;
                        
                        if (p.mesh.material) {
                            p.mesh.material.opacity = p.life;
                        }
                        
                        if (p.life <= 0) {
                            if (battleScene && p.mesh) {
                                battleScene.remove(p.mesh);
                                // Dispose geometry and material
                                if (p.mesh.geometry) p.mesh.geometry.dispose();
                                if (p.mesh.material) p.mesh.material.dispose();
                            }
                            this.particles.splice(i, 1);
                        }
                    }
                    
                    // Update tweens
                    for (let i = this.tweens.length - 1; i >= 0; i--) {
                        const t = this.tweens[i];
                        if (!t || !t.object) continue; // Safety check
                        
                        t.elapsed += dt;
                        
                        const progress = Math.min(t.elapsed / t.duration, 1);
                        const easedProgress = this.ease(progress, t.easing);
                        
                        for (let prop in t.deltaProps) {
                            if (t.object[prop] !== undefined) {
                                t.object[prop] = t.startProps[prop] + t.deltaProps[prop] * easedProgress;
                            }
                        }
                        
                        if (progress >= 1) {
                            t.completed = true;
                            this.tweens.splice(i, 1);
                        }
                    }
                } catch (error) {
                    console.error("AnimationSystem update error:", error);
                    // Don't let animation errors break the game
                }
            },
            
            // Easing functions
            ease(t, type) {
                switch(type) {
                    case 'easeInQuad': return t * t;
                    case 'easeOutQuad': return t * (2 - t);
                    case 'easeInOutQuad': return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                    case 'easeInCubic': return t * t * t;
                    case 'easeOutCubic': return (--t) * t * t + 1;
                    case 'easeInOutCubic': return t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1;
                    case 'easeInElastic': return Math.sin(13 * Math.PI / 2 * t) * Math.pow(2, 10 * (t - 1));
                    case 'easeOutElastic': return Math.sin(-13 * Math.PI / 2 * (t + 1)) * Math.pow(2, -10 * t) + 1;
                    case 'easeOutBounce': 
                        if (t < 1 / 2.75) return 7.5625 * t * t;
                        else if (t < 2 / 2.75) return 7.5625 * (t -= 1.5 / 2.75) * t + 0.75;
                        else if (t < 2.5 / 2.75) return 7.5625 * (t -= 2.25 / 2.75) * t + 0.9375;
                        else return 7.5625 * (t -= 2.625 / 2.75) * t + 0.984375;
                    default: return t; // Linear
                }
            },
            
            clear() {
                this.particles.forEach(p => {
                    if (battleScene) battleScene.remove(p.mesh);
                });
                this.particles = [];
                this.tweens = [];
            }
        };

        // Helper function to add floating interaction indicator
        function addInteractionIndicator(object, yOffset = 3) {
            // Create a canvas for the sprite
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            
            // Draw glowing "CLICK ME" text
            context.fillStyle = 'rgba(255, 215, 0, 0.9)';
            context.fillRect(0, 0, 128, 64);
            context.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            context.lineWidth = 3;
            context.strokeRect(0, 0, 128, 64);
            
            context.fillStyle = '#000000';
            context.font = 'bold 18px Arial';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText('👆 CLICK', 64, 32);
            
            // Create sprite
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ 
                map: texture,
                transparent: true,
                opacity: 0.9
            });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(2, 1, 1);
            sprite.position.y = yOffset;
            
            // Make sprite bob up and down
            sprite.userData.bobOffset = Math.random() * Math.PI * 2;
            sprite.userData.isIndicator = true;
            
            object.add(sprite);

            });

            // Golden glowing canopy
            const canopyGeometry = new THREE.SphereGeometry(3, 24, 24);
            const canopyMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x90EE90,
                emissive: 0xFFD700,
                emissiveIntensity: 0.5,
                transparent: true,
                opacity: 0.9
            });
            const canopy = new THREE.Mesh(canopyGeometry, canopyMaterial);
            canopy.position.y = 6;
            group.add(canopy);
            
            // Glowing fruit (12 fruits for 12 months - Revelation 22:2)
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const fruitGeometry = new THREE.SphereGeometry(0.3, 24, 24);
                const fruitMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xFFD700,
                    emissive: 0xFFD700,
                    emissiveIntensity: 1.0

                const fruit = new THREE.Mesh(fruitGeometry, fruitMaterial);
                fruit.position.set(
                    Math.cos(angle) * 2.5,
                    5 + Math.sin(i * 0.5) * 1,
                    Math.sin(angle) * 2.5
                );
                group.add(fruit);
            }
            
            // Radiant light from the tree
            const treeLight = new THREE.PointLight(0xFFD700, 3, 15);
            treeLight.position.y = 6;
            group.add(treeLight);

        function updateGardenWalk(dt) {
            if (gameState !== 'garden' || !gardenScene || !gardenCamera) {
                // Debug logging
                if (gameState === 'garden' && (!gardenScene || !gardenCamera)) {
                    console.warn('Garden state but missing scene/camera:', {
                        gameState,
                        hasGardenScene: !!gardenScene,
                        hasGardenCamera: !!gardenCamera
                    });
                }
                return;
            }
            
            // Use the stored garden player model
            if (!gardenPlayerModel) {
                console.warn('Garden player model is missing - cannot move');
                return;
            }
            
            // FREE ROAM MOVEMENT - WASD controls (use pre-allocated vectors)
            const moveSpeed = 0.25;  // Increased from 0.15 for faster, more fun exploration!
            gardenCamera.getWorldDirection(_fwd);
            _fwd.y = 0;
            _fwd.normalize();
            _right.crossVectors(gardenCamera.up, _fwd).normalize();
            
            let hasMoved = false;
            
            // Keyboard movement
            if (keys['w']) {
                gardenPlayerModel.position.x += _fwd.x * moveSpeed;
                gardenPlayerModel.position.z += _fwd.z * moveSpeed;
                hasMoved = true;
            }
            if (keys['s']) {
                gardenPlayerModel.position.x -= _fwd.x * moveSpeed;
                gardenPlayerModel.position.z -= _fwd.z * moveSpeed;
                hasMoved = true;
            }
            if (keys['a']) {
                gardenPlayerModel.position.x += _right.x * moveSpeed;
                gardenPlayerModel.position.z += _right.z * moveSpeed;
                hasMoved = true;
            }
            if (keys['d']) {
                gardenPlayerModel.position.x -= _right.x * moveSpeed;
                gardenPlayerModel.position.z -= _right.z * moveSpeed;
                hasMoved = true;
            }
            
            // Mobile joystick movement
            if (movementJoystick.active) {
                gardenPlayerModel.position.x += _right.x * movementJoystick.deltaX * moveSpeed;
                gardenPlayerModel.position.z += _right.z * movementJoystick.deltaX * moveSpeed;
                gardenPlayerModel.position.x -= _fwd.x * movementJoystick.deltaY * moveSpeed;
                gardenPlayerModel.position.z -= _fwd.z * movementJoystick.deltaY * moveSpeed;
                hasMoved = true;
            }
            
            // Rotate player to face movement direction
            if (hasMoved) {
                _moveDir.set(_fwd.x, 0, _fwd.z);
                if (keys['s']) _moveDir.multiplyScalar(-1);
                gardenPlayerModel.rotation.y = Math.atan2(_moveDir.x, _moveDir.z);
            }
            
            // Jesus stays at the far end - DON'T reset position every frame
            // (Jesus position is set once during creation)
            
            // Camera follows player in third-person
            const cameraDistance = 5;
            const cameraHeight = 3;
            const targetCameraX = gardenPlayerModel.position.x - Math.sin(gardenCamera.rotation.y) * cameraDistance;
            const targetCameraZ = gardenPlayerModel.position.z - Math.cos(gardenCamera.rotation.y) * cameraDistance;
            
            gardenCamera.position.x = targetCameraX;
            gardenCamera.position.y = gardenPlayerModel.position.y + cameraHeight;
            gardenCamera.position.z = targetCameraZ;
            gardenCamera.lookAt(gardenPlayerModel.position.x, gardenPlayerModel.position.y + 1, gardenPlayerModel.position.z);
            
            // Mouse camera rotation for desktop
            if (cameraJoystick.active) {
                gardenCamera.rotation.y -= cameraJoystick.deltaX * 0.05;
            }
            
            // Check for nearby interactables (for interact button - works for both desktop and mobile)
            if (gameState === 'garden') {
                nearestInteractable = null;
                let closestDistance = 15; // Increased from 5 to 15 for easier interaction!
                
                // Animate flames on Cherubim's flaming sword
                const time = Date.now() * 0.001;
                gardenScene.traverse((node) => {
                    if (node.userData && node.userData.isFlame) {
                        // Flicker and dance effect
                        const flicker = Math.sin(time * 8 + node.position.y * 10) * 0.3 + 0.7;
                        const dance = Math.sin(time * 5 + node.position.x * 20);
                        
                        node.rotation.z = Math.PI / 4 + dance * 0.1;
                        node.scale.set(
                            1 + dance * 0.1,
                            1 + flicker * 0.2,
                            1 + dance * 0.1
                        );
                        
                        // Animate emissive intensity
                        if (node.material && node.material.emissive) {
                            node.material.emissiveIntensity = node.userData.baseIntensity || 3;
                            node.material.emissiveIntensity *= flicker;
                        }
                    }
                });
                
                // Animate all clickable objects with glow effect
                gardenScene.children.forEach(child => {
                    if (child.userData && child.userData.clickable) {
                        const distance = gardenPlayerModel.position.distanceTo(child.position);
                        
                        // Animate floating indicators (bob up and down)
                        child.traverse((node) => {
                            if (node.userData && node.userData.isIndicator) {
                                const time = Date.now() * 0.001;
                                node.position.y = node.parent.userData.indicatorBaseY || 3;
                                node.position.y += Math.sin(time * 2 + node.userData.bobOffset) * 0.3;
                                // Always face camera
                                if (gardenCamera) {
                                    node.quaternion.copy(gardenCamera.quaternion);
                                }
                            }
                        });
                        
                        // Add pulsing glow effect to nearby interactables
                        if (distance < 15) {
                            child.traverse((node) => {
                                if (node.isMesh && node.material && !node.userData.isIndicator) {
                                    if (!node.userData.originalEmissive) {
                                        // Store original emissive
                                        node.userData.originalEmissive = node.material.emissive ? node.material.emissive.clone() : new THREE.Color(0x000000);
                                        node.userData.originalEmissiveIntensity = node.material.emissiveIntensity || 0;
                                    }
                                    // Pulse effect based on time
                                    const pulse = Math.sin(Date.now() * 0.003) * 0.5 + 0.5;
                                    const glowIntensity = distance < 15 ? 0.3 + pulse * 0.2 : 0;
                                    
                                    if (node.material.emissive) {
                                        node.material.emissive.setHex(0xffd700); // Golden glow
                                        node.material.emissiveIntensity = glowIntensity;
                                    }
                                }
                            });
                        } else {
                            // Reset glow for distant objects
                            child.traverse((node) => {
                                if (node.isMesh && node.material && node.userData.originalEmissive && !node.userData.isIndicator) {
                                    if (node.material.emissive) {
                                        node.material.emissive.copy(node.userData.originalEmissive);
                                        node.material.emissiveIntensity = node.userData.originalEmissiveIntensity;
                                    }
                                }
                            });
                        }
                        
                        // Find closest interactable
                        if (distance < closestDistance) {
                            closestDistance = distance;
                            nearestInteractable = child.userData;
                        }
                    }
                });
                
                // Show/hide interact button based on proximity
                const interactBtn = document.getElementById('mobile-interact-btn');
                if (interactBtn) {
                    if (nearestInteractable) {
                        interactBtn.style.display = 'flex';
                        // Add distance to button text for better feedback
                        const distanceText = Math.round(closestDistance);
                        interactBtn.textContent = `INTERACT (${distanceText}m)`;
                        // Make button more prominent when very close
                        if (closestDistance < 5) {
                            interactBtn.style.backgroundColor = 'rgba(255, 215, 0, 0.95)';
                            interactBtn.style.color = '#000';
                            interactBtn.style.transform = 'scale(1.1)';
                        } else {
                            interactBtn.style.backgroundColor = 'rgba(52, 152, 219, 0.9)';
                            interactBtn.style.color = '#fff';
                            interactBtn.style.transform = 'scale(1.0)';
                        }
                    } else {
                        interactBtn.style.display = 'none';
                    }
                }
            }
        }

        // Click handler for garden objects
        function onGardenClick(event) {
            if (gameState !== 'garden') return;
            
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(new THREE.Vector2(x, y), gardenCamera);
            const intersects = raycaster.intersectObjects(gardenScene.children, true);
            
            for (let intersect of intersects) {
                let obj = intersect.object;
                
                // Check userData on object or its parent
                while (obj) {
                    if (obj.userData && obj.userData.clickable) {
                        // PARTICLE BURST EFFECT on interaction!
                        createInteractionBurst(intersect.point);
                        showGardenDialog(obj.userData.type, obj.userData);
                        return;
                    }
                    obj = obj.parent;
                }
            }
        }
        
        // Create particle burst effect at interaction point
        function createInteractionBurst(position) {
            const particleCount = 20;
            for (let i = 0; i < particleCount; i++) {
                const particleGeometry = new THREE.SphereGeometry(0.1, 8, 8);
                const particleMaterial = new THREE.MeshStandardMaterial({
                    color: 0xffd700,
                    emissive: 0xffd700,
                    emissiveIntensity: 2,
                    transparent: true,
                    opacity: 1
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                particle.position.copy(position);
                gardenScene.add(particle);
                
                // Random velocity
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    Math.random() * 0.3,
                    (Math.random() - 0.5) * 0.2
                );
                
                // Animate particle
                const startTime = Date.now();
                const animateParticle = () => {
                    const elapsed = Date.now() - startTime;
                    if (elapsed > 1000) {
                        gardenScene.remove(particle);
                        particle.geometry.dispose();
                        particle.material.dispose();
                        return;
                    }
                    
                    // Update position
                    particle.position.x += velocity.x;
                    particle.position.y += velocity.y;
                    particle.position.z += velocity.z;
                    velocity.y -= 0.01; // Gravity
                    
                    // Fade out
                    particle.material.opacity = 1 - (elapsed / 1000);
                    particle.scale.setScalar(1 - (elapsed / 1000));
                    
                    requestAnimationFrame(animateParticle);
                };
                animateParticle();
            }
        }

                const riverName = data.riverName || 'River';

                        <strong>"A river watering the garden flowed from Eden; from there it was separated into four headwaters. The name of the first is the Pishon... The name of the second river is the Gihon... The name of the third river is the Tigris... And the fourth river is the Euphrates."</strong>
